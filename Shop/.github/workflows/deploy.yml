name: Deploy to Azure Web App

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 1. 자바 백엔드 폴더 내부로 들어가서 그래들 빌드를 수행합니다.
    - name: Build with Gradle
      working-directory: ./Shop
      run: |
        chmod +x ./gradlew
        ./gradlew clean build -x test

    # 2. 🔥 [치트키] 빌드된 app.jar를 최상위 루트 폴더로 강제 복사합니다.
    - name: Copy artifact to root
      run: cp Shop/build/libs/app.jar ./app.jar

    # 3. 최상위 루트에 꺼내놓은 app.jar를 Azure로 곧바로 쏘아 올립니다.
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'mymall-ebook'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: './app.jar'